name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Compile Python
        run: python -m compileall plugins/ax-performance-advisor-plugin/scripts plugins/ax-performance-advisor-plugin/tests
      - name: Run unit tests
        run: python -m unittest discover -s plugins/ax-performance-advisor-plugin/tests -v
      - name: Validate JSON
        shell: pwsh
        run: |
          python -m json.tool plugins/ax-performance-advisor-plugin/.codex-plugin/plugin.json | Out-Null
          python -m json.tool plugins/ax-performance-advisor-plugin/.mcp.json | Out-Null
          python -m json.tool plugins/ax-performance-advisor-plugin/.app.json | Out-Null
          python -m json.tool plugins/ax-performance-advisor-plugin/config.example.json | Out-Null
          python -m json.tool plugins/ax-performance-advisor-plugin/masking-policy.example.json | Out-Null
      - name: Validate skills
        shell: pwsh
        run: |
          $files=Get-ChildItem -Recurse -Filter SKILL.md -LiteralPath plugins/ax-performance-advisor-plugin/skills
          foreach($f in $files){
            $text=Get-Content -LiteralPath $f.FullName -Raw
            if($text -notmatch '^---\s*\r?\nname:' -or $text -notmatch 'description:'){ throw "Bad skill frontmatter: $($f.FullName)" }
          }
          Write-Output "SkillCount=$($files.Count)"
      - name: Validate documentation links
        shell: pwsh
        run: |
          $required=@(
            "plugins/ax-performance-advisor-plugin/docs/INDEX.md",
            "plugins/ax-performance-advisor-plugin/docs/architecture.md",
            "plugins/ax-performance-advisor-plugin/docs/operations-guide.md",
            "plugins/ax-performance-advisor-plugin/docs/testing-guide.md",
            "plugins/ax-performance-advisor-plugin/docs/security-model.md",
            "plugins/ax-performance-advisor-plugin/docs/threat-model.md",
            "plugins/ax-performance-advisor-plugin/docs/release-runbook.md"
          )
          foreach($path in $required){
            if(!(Test-Path -LiteralPath $path)){ throw "Missing required documentation: $path" }
          }
      - name: Check repository hygiene
        shell: pwsh
        run: |
          $tracked = git ls-files
          $forbidden = $tracked | Where-Object {
            ($_ -match '(^|/)evidence/' -and $_ -notmatch '(^|/)sample/evidence/') -or
            $_ -match '(^|/)out/' -or
            $_ -match '\.(bak|tmp|log)$'
          }
          if($forbidden){ throw "Forbidden generated/evidence files tracked: $($forbidden -join ', ')" }
